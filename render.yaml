services:
  # 类型：Web服务
  - type: web
    name: marketing-backend
    env: node
    plan: free
    region: oregon

    # 构建配置
    buildCommand: cd server && pnpm install && pnpm run build
    startCommand: cd server && node dist/index.js

    # 环境变量
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

    # 健康检查
    healthCheckPath: /api/v1/health

# 数据库配置
databases:
  - name: marketing-db
    plan: free
    databaseName: marketing
    user: marketing_user

# 环境变量自动注入到Web服务
# RENDER会将数据库连接信息注入为以下环境变量：
# DATABASE_URL - PostgreSQL连接字符串
# DATABASE_PUBLIC_URL - 公网可访问的连接字符串
